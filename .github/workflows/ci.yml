name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libmnl-dev libssl-dev

      - name: Install npm dependencies + build native addon
        run: npm ci

      - name: Typecheck examples and tests
        run: npx tsc --noEmit -p tsconfig.typecheck.json

      - name: Load wireguard kernel module (best effort)
        run: sudo modprobe wireguard || echo "wireguard module unavailable on this runner - kernel-backed tests will skip"

      - name: Run tests
        # Kernel/UAPI-backed tests in tests/index.ts require root + the relevant
        # backend; they self-skip when either is missing, so this is safe to
        # run unconditionally on runners without WireGuard.
        run: sudo env "PATH=$PATH" npm test

  package-dry-run:
    name: Verify packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libmnl-dev libssl-dev
      - run: npm ci
      - name: Stage prebuild and verify npm pack contents
        run: |
          npm run package
          npm pack --dry-run

  release:
    name: Release
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/alpha')
    needs:
      - test
      - package-dry-run
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_CONFIG_PROVENANCE: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x
          registry-url: "https://registry.npmjs.org/"

      - name: Install native build dependencies
        # Needed because `prepublishOnly` (npm run package) compiles the addon
        # and stages bin/<triplet>/node-wireguard.node into the published tarball.
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libmnl-dev libssl-dev

      - name: Install dependencies
        run: npm install

      - name: Update npm for trusted publishing support
        run: npm install -g npm@latest

      - name: Run semantic-release
        run: npx semantic-release
